<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сибилевец 2 — Язык будущего</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #08080c;
            --bg-secondary: #111118;
            --bg-card: #18181f;
            --bg-card-hover: #1e1e28;
            --text-primary: #f0f0f5;
            --text-secondary: #b0b0bb;
            --text-muted: #888899;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(0, 230, 180, 0.25);
            --cyan: #00e6b4;
            --cyan-glow: rgba(0, 230, 180, 0.3);
            --blue-light: #5ba0f5;
            --blue-dark: #3d7edb;
            --gradient-main: linear-gradient(135deg, var(--cyan), var(--blue-light));
            --gradient-text: linear-gradient(135deg, var(--cyan), #6db3ff);
            --shadow-sm: 0 4px 20px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 12px 40px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 24px 60px rgba(0, 0, 0, 0.6);
            --shadow-glow: 0 0 40px var(--cyan-glow);
            --radius-lg: 24px;
            --radius-xl: 32px;
            --radius-full: 60px;
            --transition-bounce: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(155deg, #08080c 0%, #0b131b 45%, #0d1720 75%, #0a1018 100%);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
        }

        /* === АНИМАЦИИ === */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeUpScale {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        @keyframes scaleUp {
            from {
                transform: scale(0.85);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        @keyframes pulseGlow {
            0%,
            100% {
                box-shadow: 0 0 0 0 var(--cyan-glow);
            }
            50% {
                box-shadow: 0 0 0 22px rgba(0, 230, 180, 0);
            }
        }
        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .anim-fade-up {
            animation: fadeUp 0.8s ease-out both;
        }
        .anim-fade-up-scale {
            animation: fadeUpScale 0.8s ease-out both;
        }
        .anim-slide-left {
            animation: slideInLeft 0.8s ease-out both;
        }
        .anim-slide-right {
            animation: slideInRight 0.8s ease-out both;
        }
        .anim-scale-up {
            animation: scaleUp 0.7s ease-out both;
        }

        /* === ХЕДЕР === */
        header {
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(8, 8, 12, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid var(--border-subtle);
            animation: fadeUp 0.8s ease-out;
            transition: all 0.35s;
        }
        header.scrolled {
            box-shadow: 0 2px 30px rgba(0, 0, 0, 0.5);
            padding: 10px 40px;
            background: rgba(8, 8, 12, 0.88);
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .logo-img {
            height: 44px;
            filter: drop-shadow(0 0 14px rgba(0, 230, 180, 0.35));
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .logo-img:hover {
            transform: scale(1.08) rotate(-3deg);
            filter: drop-shadow(0 0 22px rgba(0, 230, 180, 0.55));
        }
        .brand-title {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }
        nav a {
            font-weight: 700;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 40px;
            position: relative;
            transition: all 0.3s;
            font-size: 0.95rem;
            letter-spacing: -0.2px;
        }
        nav a:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }
        nav a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 3px;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gradient-main);
            border-radius: 3px;
            transition: width 0.3s;
        }
        nav a:hover::after {
            width: 55%;
        }

        /* === ГЕРОЙ === */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 140px 20px 80px;
            position: relative;
            overflow: hidden;
            background: transparent;
        }
        .hero::before {
            content: '';
            position: absolute;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(0, 230, 180, 0.05) 0%, transparent 70%);
            top: -250px;
            right: -200px;
            border-radius: 50%;
            pointer-events: none;
        }
        .hero::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(91, 160, 245, 0.04) 0%, transparent 70%);
            bottom: -150px;
            left: -150px;
            border-radius: 50%;
            pointer-events: none;
        }

        .hero-badge {
            display: inline-block;
            padding: 10px 24px;
            background: rgba(0, 230, 180, 0.07);
            border: 1px solid rgba(0, 230, 180, 0.22);
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--cyan);
            margin-bottom: 28px;
            animation: fadeUpScale 0.8s ease-out 0.1s both;
            letter-spacing: 0.5px;
        }

        .hero h1 {
            font-size: clamp(3.2rem, 7vw, 6rem);
            font-weight: 900;
            margin-bottom: 18px;
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: scaleUp 1s ease-out 0.2s both;
            position: relative;
            z-index: 1;
            letter-spacing: -1.5px;
            line-height: 1.1;
        }
        .hero-subtitle {
            font-size: 1.25rem;
            max-width: 650px;
            color: var(--text-secondary);
            font-weight: 500;
            margin-bottom: 42px;
            animation: fadeUp 1s ease-out 0.4s both;
            position: relative;
            z-index: 1;
            line-height: 1.7;
        }
        .hero-subtitle a {
            color: var(--cyan);
            font-weight: 800;
            text-decoration: underline;
            text-underline-offset: 4px;
        }
        .hero-subtitle a:hover {
            color: #fff;
        }

        /* Статистика */
        .hero-stats {
            display: flex;
            gap: 28px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 46px;
            animation: fadeUp 1s ease-out 0.5s both;
            position: relative;
            z-index: 1;
        }
        .hero-stat {
            background: var(--bg-card);
            border-radius: 22px;
            padding: 28px 36px;
            box-shadow: var(--shadow-sm);
            text-align: center;
            min-width: 140px;
            transition: all var(--transition-bounce);
            border: 1px solid var(--border-subtle);
            position: relative;
            overflow: hidden;
        }
        .hero-stat::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 22px;
            background: var(--gradient-main);
            opacity: 0;
            transition: opacity 0.4s;
            z-index: 0;
        }
        .hero-stat:hover::before {
            opacity: 0.04;
        }
        .hero-stat:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-md), 0 0 50px rgba(0, 230, 180, 0.08);
            border-color: var(--border-hover);
        }
        .hero-stat .stat-number {
            font-size: 3rem;
            font-weight: 900;
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: block;
            line-height: 1;
            position: relative;
            z-index: 1;
            letter-spacing: -1px;
        }
        .hero-stat .stat-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            position: relative;
            z-index: 1;
        }

        .btn-primary {
            display: inline-block;
            padding: 18px 54px;
            border-radius: var(--radius-full);
            font-weight: 900;
            font-size: 1.05rem;
            text-decoration: none;
            background: #fff;
            color: #000;
            transition: all var(--transition-bounce);
            box-shadow: var(--shadow-sm);
            animation: fadeUp 1s ease-out 0.7s both;
            position: relative;
            z-index: 1;
            letter-spacing: -0.3px;
        }
        .btn-primary:hover {
            transform: translateY(-6px) scale(1.03);
            background: var(--gradient-main);
            color: #000;
            box-shadow: var(--shadow-glow), 0 16px 45px rgba(0, 230, 180, 0.3);
            animation: pulseGlow 2.2s infinite;
        }

        /* === СЕКЦИИ === */
        section {
            padding: 100px 20px;
            position: relative;
            background: transparent;
        }
        .container {
            max-width: 1150px;
            margin: 0 auto;
        }

        .section-title {
            font-size: clamp(2rem, 4vw, 2.8rem);
            font-weight: 900;
            margin-bottom: 16px;
            position: relative;
            letter-spacing: -0.6px;
            color: #fff;
        }
        .section-title span {
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .section-title::after {
            content: '';
            display: block;
            width: 64px;
            height: 4px;
            background: var(--gradient-main);
            margin-top: 12px;
            border-radius: 2px;
        }
        .section-title.centered {
            text-align: center;
        }
        .section-title.centered::after {
            margin: 12px auto 0;
        }

        .section-subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 50px;
            font-weight: 500;
            line-height: 1.7;
        }
        .section-subtitle.centered {
            text-align: center;
            max-width: 650px;
            margin-left: auto;
            margin-right: auto;
        }

        /* === КАРТОЧКИ О ПРОЕКТЕ === */
        .about-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
            gap: 28px;
            margin-top: 10px;
        }
        .about-card {
            background: var(--bg-card);
            padding: 40px 32px;
            border-radius: var(--radius-lg);
            transition: all var(--transition-bounce);
            border: 1px solid var(--border-subtle);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .about-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--gradient-main);
            opacity: 0;
            transition: opacity 0.4s;
            z-index: 0;
            border-radius: var(--radius-lg);
        }
        .about-card:hover::after {
            opacity: 0.03;
        }
        .about-card:hover {
            transform: translateY(-12px);
            border-color: var(--border-hover);
            box-shadow: var(--shadow-md), 0 0 60px rgba(0, 230, 180, 0.05);
            background: var(--bg-card-hover);
        }
        .about-card .icon-circle {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--gradient-main);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2rem;
            color: #000;
            font-weight: 900;
            box-shadow: 0 8px 30px var(--cyan-glow);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 1;
        }
        .about-card:hover .icon-circle {
            transform: scale(1.12) rotate(-6deg);
            box-shadow: 0 12px 40px rgba(0, 230, 180, 0.4);
        }
        .about-card h3 {
            font-size: 1.35rem;
            font-weight: 900;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
            position: relative;
            z-index: 1;
            color: #fff;
        }
        .about-card p {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.98rem;
            line-height: 1.6;
            position: relative;
            z-index: 1;
        }

        /* === АЛФАВИТ === */
        .alphabet-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 40px 0;
        }
        .letter {
            width: 66px;
            height: 66px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 900;
            border-radius: 18px;
            background: var(--bg-card);
            color: #fff;
            border: 2px solid var(--border-subtle);
            transition: all var(--transition-bounce);
            cursor: default;
            position: relative;
            overflow: hidden;
        }
        .letter::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--gradient-main);
            opacity: 0;
            transition: opacity 0.3s;
            border-radius: 16px;
            z-index: 0;
        }
        .letter:hover {
            transform: scale(1.22) rotate(-7deg);
            border-color: transparent;
            color: #000;
            box-shadow: 0 14px 40px var(--cyan-glow);
            z-index: 10;
        }
        .letter:hover::before {
            opacity: 1;
        }
        .letter span {
            position: relative;
            z-index: 1;
        }

        /* === ОСОБЕННОСТИ === */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(310px, 1fr));
            gap: 28px;
        }
        .feature-card {
            background: var(--bg-card);
            padding: 38px 32px;
            border-radius: var(--radius-lg);
            transition: all var(--transition-bounce);
            border: 1px solid var(--border-subtle);
            position: relative;
            overflow: hidden;
        }
        .feature-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--gradient-main);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.5s ease;
            border-radius: 0 0 4px 4px;
            z-index: 1;
        }
        .feature-card:hover::after {
            transform: scaleX(1);
        }
        .feature-card:hover {
            transform: translateY(-10px);
            border-color: var(--border-hover);
            box-shadow: var(--shadow-md), 0 0 50px rgba(0, 230, 180, 0.04);
            background: var(--bg-card-hover);
        }
        .feature-card h3 {
            font-size: 1.35rem;
            font-weight: 900;
            margin-bottom: 6px;
            letter-spacing: -0.3px;
            color: #fff;
            position: relative;
            z-index: 1;
        }
        .feature-card .feature-icon {
            font-size: 2.4rem;
            margin-bottom: 14px;
            display: block;
            position: relative;
            z-index: 1;
        }
        .feature-card p {
            color: var(--text-secondary);
            font-weight: 500;
            position: relative;
            z-index: 1;
        }
        .feature-card ul {
            list-style: none;
            padding: 0;
            margin-top: 14px;
            position: relative;
            z-index: 1;
        }
        .feature-card ul li {
            padding: 7px 0;
            color: var(--text-secondary);
            font-weight: 500;
            position: relative;
            padding-left: 26px;
        }
        .feature-card ul li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: var(--cyan);
            font-weight: 900;
            font-size: 1rem;
        }

        /* === СООБЩЕСТВО === */
        .community-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
            gap: 28px;
        }
        .community-card {
            background: var(--bg-card);
            padding: 40px 32px;
            border-radius: var(--radius-lg);
            text-align: center;
            transition: all var(--transition-bounce);
            border: 1px solid var(--border-subtle);
            color: inherit;
            display: block;
        }
        .community-card:hover {
            transform: translateY(-12px);
            border-color: var(--border-hover);
            box-shadow: var(--shadow-md), 0 0 55px rgba(0, 230, 180, 0.05);
            background: var(--bg-card-hover);
        }
        .community-card .comm-icon {
            font-size: 3.2rem;
            margin-bottom: 14px;
            display: block;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .community-card:hover .comm-icon {
            transform: scale(1.18);
            animation: float 2s ease-in-out infinite;
        }
        .community-card h3 {
            font-size: 1.25rem;
            font-weight: 900;
            margin-bottom: 6px;
            color: #fff;
            letter-spacing: -0.3px;
        }
        .community-card p {
            color: var(--text-secondary);
            font-weight: 500;
        }
        .community-card .comm-link-text {
            display: inline-block;
            margin-top: 14px;
            font-weight: 700;
            color: var(--cyan);
            transition: color 0.3s;
            font-size: 0.95rem;
        }
        .community-card:hover .comm-link-text {
            color: #fff;
        }

        /* === FAQ === */
        .faq-list {
            max-width: 780px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .faq-item {
            background: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s;
            border: 1px solid var(--border-subtle);
            cursor: pointer;
        }
        .faq-item:hover {
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.25);
        }
        .faq-item summary {
            padding: 22px 28px;
            font-weight: 900;
            font-size: 1.08rem;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: -0.2px;
            transition: color 0.3s;
            color: #fff;
        }
        .faq-item summary::-webkit-details-marker {
            display: none;
        }
        .faq-item summary::after {
            content: '+';
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--cyan);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            flex-shrink: 0;
            margin-left: 16px;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(0, 230, 180, 0.08);
        }
        .faq-item[open] summary::after {
            content: '−';
            transform: rotate(180deg);
            background: rgba(0, 230, 180, 0.18);
            color: var(--cyan);
        }
        .faq-item[open] summary {
            color: var(--cyan);
        }
        .faq-item .faq-answer {
            padding: 0 28px 22px;
            color: var(--text-secondary);
            font-weight: 500;
            line-height: 1.7;
            font-size: 0.98rem;
        }
        .faq-item .faq-answer ul {
            list-style: disc;
            padding-left: 20px;
            margin-top: 8px;
        }
        .faq-item .faq-answer ul li {
            margin-bottom: 5px;
        }

        /* === КОНТАКТЫ === */
        .contact-box {
            background: var(--bg-card);
            padding: 70px 40px;
            border-radius: var(--radius-xl);
            text-align: center;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-smooth);
            border: 1px solid var(--border-subtle);
        }
        .contact-box:hover {
            box-shadow: var(--shadow-md), 0 0 60px rgba(0, 230, 180, 0.04);
            border-color: var(--border-hover);
        }
        .contact-btn {
            display: inline-block;
            padding: 18px 50px;
            border-radius: var(--radius-full);
            background: #fff;
            color: #000;
            font-weight: 900;
            font-size: 1rem;
            text-decoration: none;
            margin-top: 18px;
            transition: all var(--transition-bounce);
            letter-spacing: -0.3px;
        }
        .contact-btn:hover {
            background: var(--gradient-main);
            transform: scale(1.06);
            box-shadow: var(--shadow-glow), 0 14px 40px rgba(0, 230, 180, 0.35);
            animation: pulseGlow 2.2s infinite;
        }

        /* === ФУТЕР === */
        footer {
            text-align: center;
            padding: 36px 20px;
            color: var(--text-muted);
            border-top: 1px solid var(--border-subtle);
            font-weight: 500;
            font-size: 0.9rem;
            background: rgba(8, 8, 12, 0.7);
            backdrop-filter: blur(10px);
        }
        footer a {
            color: var(--cyan);
            text-decoration: none;
            font-weight: 700;
            transition: color 0.3s;
        }
        footer a:hover {
            color: #fff;
        }

        /* === АДАПТИВ === */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 10px;
                padding: 12px 15px;
            }
            header.scrolled {
                padding: 8px 15px;
            }
            nav {
                gap: 3px;
            }
            nav a {
                margin: 0;
                padding: 6px 11px;
                font-size: 0.82rem;
            }
            .hero h1 {
                font-size: 2.4rem;
            }
            .hero-subtitle {
                font-size: 1rem;
            }
            .hero-stats {
                gap: 12px;
            }
            .hero-stat {
                padding: 20px 22px;
                min-width: 105px;
                border-radius: 18px;
            }
            .hero-stat .stat-number {
                font-size: 2.2rem;
            }
            .hero-stat .stat-label {
                font-size: 0.7rem;
            }
            .btn-primary {
                padding: 14px 36px;
                font-size: 0.95rem;
            }
            .contact-box {
                padding: 30px 18px;
            }
            .letter {
                width: 50px;
                height: 50px;
                font-size: 1.3rem;
                border-radius: 14px;
            }
            .letter:hover {
                transform: scale(1.15) rotate(-5deg);
            }
            .about-grid,
            .features-grid,
            .community-grid {
                grid-template-columns: 1fr;
            }
            .faq-item summary {
                padding: 16px 18px;
                font-size: 0.98rem;
            }
            .faq-item .faq-answer {
                padding: 0 18px 16px;
            }
            .section-title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <header id="site-header">
        <div class="brand-container">
            <img src="logo.png" alt="Логотип Сибилевец 2" class="logo-img">

    <!-- ГЕРОЙ -->

                },
                {
                    question: "Чем Сибилевец отличается от русского?",
                    answer: `<p>Основные отличия:</p>
                     <ul><li>Нет падежей и спряжений</li><li>31 буква с чёткими звуками</li><li>3 простых правила грамматики</li><li>Слова не меняются</li></ul>`
                },
                {
                    question: "Почему в алфавите есть латинская I?",
                    answer: `<p>Для чистоты принципа «пишем как слышим»:</p>
                     <ul><li><strong>I</strong> (латиница) — звук [и] как в «мир»</li><li><strong>И</strong> (кириллица) — звук [ɨ] как в «мышь»</li></ul>

                },

                    question: "Кто может использовать Сибилевец?",
                    answer: `<p>Все, кто хочет упростить общение:</p>
                     <ul><li>Иностранцы, изучающие русский</li><li>Дети и подростки</li><li>Все, кто ценит простоту и ясность</li></ul>`
                },
                {
                    question: "Сколько правил в грамматике?",
                    answer: `<p>Всего <strong>3 основных правила</strong>:</p>
                     <ul><li>Слова не меняются</li><li>Множественное число = «все»</li><li>Время глагола = «било» / «буду»</li></ul>`
                },
                {
                    question: "Как предложить новое слово?",
                    answer: "<p>Присоединяйтесь к нашему Telegram-сообществу и предлагайте слова в обсуждениях! Каждое предложение рассматривается.</p>"
                }
            ],

            contactTitle: "Свяжитесь с нами",
            contactText: "Готовы обсудить проект или предложить идею для развития языка? Мы всегда на связи!",
            contactBtn: "Написать сообщение",

            footerHTML: `&copy; 2026 Сибилевец 2. Все права защищены. Язык будущего уже здесь. &nbsp;|&nbsp;
            <a href="https://timoshamoscow.github.io/sibylevec-site.github.io/" target="_blank" rel="noopener">Оригинальный сайт</a>`
        };

        // ======================= ЗАПОЛНЕНИЕ КОНТЕНТА =======================
        document.addEventListener('DOMContentLoaded', function() {
            // Бренд
            document.getElementById('brandName').textContent = SITE_TEXT.brandName;

            // Навигация
            const nav = document.getElementById('mainNav');
            SITE_TEXT.navLinks.forEach(link => {
                const a = document.createElement('a');
                a.href = link.href;
                a.textContent = link.text;
                nav.appendChild(a);
            });

            // Hero
            document.getElementById('heroBadge').textContent = SITE_TEXT.heroBadge;
            document.getElementById('heroTitle').textContent = SITE_TEXT.heroTitle;
            document.getElementById('heroSubtitle').innerHTML = SITE_TEXT.heroSubtitleHTML;
            document.getElementById('heroBtn').textContent = SITE_TEXT.heroBtn;

            const statsContainer = document.getElementById('heroStatsContainer');
            SITE_TEXT.heroStats.forEach((stat, index) => {
                const div = document.createElement('div');
                div.className = 'hero-stat';
                div.style.animationDelay = (0.5 + index * 0.1) + 's';
                div.innerHTML = `<span class="stat-number">${stat.number}</span><span class="stat-label">${stat.label}</span>`;
                statsContainer.appendChild(div);
            });

            // О проекте
            document.getElementById('aboutTitle').textContent = SITE_TEXT.aboutTitle;
            document.getElementById('aboutSubtitle').textContent = SITE_TEXT.aboutSubtitle;
            const aboutGrid = document.getElementById('aboutGrid');
            SITE_TEXT.aboutCards.forEach((card, i) => {
                const div = document.createElement('div');
                div.className = 'about-card anim-fade-up-scale';
                div.style.animationDelay = (0.1 + i * 0.15) + 's';
                div.innerHTML = `
                    <div class="icon-circle">${card.icon}</div>
                    <h3>${card.title}</h3>
                    <p>${card.text}</p>
                `;
                aboutGrid.appendChild(div);
            });

            // Алфавит
            document.getElementById('alphabetTitle').textContent = SITE_TEXT.alphabetTitle;
            document.getElementById('alphabetSubtitle').textContent = SITE_TEXT.alphabetSubtitle;
            const alphabetGrid = document.getElementById('alphabetGrid');
            SITE_TEXT.alphabetLetters.forEach(letter => {
                const div = document.createElement('div');
                div.className = 'letter';
                div.innerHTML = `<span>${letter}</span>`;
                alphabetGrid.appendChild(div);
            });

            // Особенности
            document.getElementById('featuresTitle').textContent = SITE_TEXT.featuresTitle;
            document.getElementById('featuresSubtitle').textContent = SITE_TEXT.featuresSubtitle;
            const featuresGrid = document.getElementById('featuresGrid');
            const featureAnimClasses = ['anim-slide-left', 'anim-fade-up-scale', 'anim-slide-right'];
            SITE_TEXT.featuresCards.forEach((card, i) => {
                const div = document.createElement('div');
                div.className = `feature-card ${featureAnimClasses[i] || 'anim-fade-up-scale'}`;
                div.style.animationDelay = (0.1 + i * 0.15) + 's';
                let listHTML = '';
                if (card.list) {
                    listHTML = '<ul>' + card.list.map(item => `<li>${item}</li>`).join('') + '</ul>';
                }
                div.innerHTML = `
                    <span class="feature-icon">${card.icon}</span>
                    <h3>${card.title}</h3>
                    <p>${card.text}</p>
                    ${listHTML}
                `;
                featuresGrid.appendChild(div);
            });

            // Сообщество
            document.getElementById('communityTitle').textContent = SITE_TEXT.communityTitle;
            document.getElementById('communitySubtitle').textContent = SITE_TEXT.communitySubtitle;
            const communityGrid = document.getElementById('communityGrid');
            SITE_TEXT.communityCards.forEach((card, i) => {
                const div = document.createElement('div');
                div.className = 'community-card anim-fade-up-scale';
                div.style.animationDelay = (0.1 + i * 0.15) + 's';
                div.innerHTML = `
                    <span class="comm-icon">${card.icon}</span>
                    <h3>${card.title}</h3>
                    <p>${card.text}</p>
                    <span class="comm-link-text">${card.linkText}</span>
                `;
                communityGrid.appendChild(div);
            });

            // FAQ
            document.getElementById('faqTitle').textContent = SITE_TEXT.faqTitle;
            document.getElementById('faqSubtitle').textContent = SITE_TEXT.faqSubtitle;
            const faqList = document.getElementById('faqList');
            SITE_TEXT.faqItems.forEach((item, i) => {
                const details = document.createElement('details');
                details.className = 'faq-item anim-fade-up';
                details.style.animationDelay = (0.05 + i * 0.05) + 's';
                details.innerHTML = `
                    <summary>${item.question}</summary>
                    <div class="faq-answer">${item.answer}</div>
                `;
                faqList.appendChild(details);
            });

            // Контакты
            document.getElementById('contactTitle').textContent = SITE_TEXT.contactTitle;
            document.getElementById('contactText').textContent = SITE_TEXT.contactText;
            document.getElementById('contactBtn').textContent = SITE_TEXT.contactBtn;

            // Футер
            document.getElementById('footerText').innerHTML = SITE_TEXT.footerHTML;

            // Перепривязка событий FAQ (аккордеон)
            const allDetails = document.querySelectorAll('.faq-item');
            allDetails.forEach(detail => {
                detail.addEventListener('toggle', function() {
                    if (this.open) {
                        allDetails.forEach(other => {
                            if (other !== this && other.open) {
                                other.open = false;
                            }
                        });
                    }
                });
            });

            // Скролл-эффект хедера
            const header = document.getElementById('site-header');
            window.addEventListener('scroll', () => {
                if (window.scrollY > 50) {
                    header.classList.add('scrolled');
                } else {
                    header.classList.remove('scrolled');
                }
            });
        });
    </script>
</body>
</html>
